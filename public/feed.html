<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Short streaming vertical</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: #050505; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
    .app, .video-container { width: 100vw; height: 100vh; position: relative; }
    video { width: 100%; height: 100%; object-fit: cover; background: #000; }
    .topbar, .side, .bottom, .panel { position: absolute; z-index: 4; }
    .topbar { top: 12px; left: 12px; right: 12px; display: flex; gap: 12px; justify-content: space-between; }
    .chip, button { background: rgba(10,10,10,.58); border: 1px solid rgba(255,255,255,.14); color: #fff; border-radius: 14px; padding: 10px 12px; }
    button { cursor: pointer; }
    .panel { top: 62px; left: 12px; max-width: min(92vw, 420px); display: grid; gap: 8px; }
    .side { right: 12px; bottom: 140px; display: flex; flex-direction: column; gap: 8px; }
    .bottom { left: 0; right: 0; bottom: 0; padding: 18px; background: linear-gradient(to top, rgba(0,0,0,.84), transparent); }
    .caption { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .meta { opacity: .9; font-size: 13px; line-height: 1.45; }
    .progress-wrap { margin-top: 12px; height: 4px; background: rgba(255,255,255,.15); border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, #00d4ff, #7c5cff); }
    .buffering { position: absolute; inset: 0; display: none; place-items: center; background: rgba(0,0,0,.26); z-index: 5; }
    .buffering span { padding: 10px 14px; border-radius: 999px; background: rgba(0,0,0,.7); }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="chip" id="status">Chargement...</div>
      <div>
        <button id="reloadBtn">Reload</button>
      </div>
    </div>

    <div class="panel">
      <div class="chip" id="sessionInfo">Session</div>
      <div class="chip" id="debug">Préchargement en attente...</div>
    </div>

    <div class="video-container" id="videoContainer">
      <video id="video" playsinline muted autoplay></video>
      <div class="buffering" id="buffering"><span>Chargement intelligent...</span></div>

      <div class="side">
        <button id="prevBtn">↑</button>
        <button id="likeBtn">❤</button>
        <button id="toggleBtn">Pause</button>
        <button id="muteBtn">Son</button>
        <button id="nextBtn">↓</button>
      </div>

      <div class="bottom">
        <div class="caption" id="caption">...</div>
        <div class="meta" id="meta">...</div>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById("video");
    const statusEl = document.getElementById("status");
    const debugEl = document.getElementById("debug");
    const sessionInfoEl = document.getElementById("sessionInfo");
    const captionEl = document.getElementById("caption");
    const metaEl = document.getElementById("meta");
    const progressBar = document.getElementById("progressBar");
    const bufferingEl = document.getElementById("buffering");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const likeBtn = document.getElementById("likeBtn");
    const toggleBtn = document.getElementById("toggleBtn");
    const muteBtn = document.getElementById("muteBtn");
    const reloadBtn = document.getElementById("reloadBtn");

    let hlsInstance = null;
    let feed = [];
    let currentIndex = 0;
    let sessionId = localStorage.getItem("demo_session_id") || `sess_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    let preloadCache = new Map();
    let lastSentSecond = -1;

    localStorage.setItem("demo_session_id", sessionId);

    async function fetchFeed(offset = 0) {
      const response = await fetch(`/api/v2/feed?session_id=${sessionId}&limit=20&offset=${offset}`);
      const result = await response.json();
      if (!result.success) throw new Error(result.message || "Erreur feed");
      sessionInfoEl.textContent = `Session ${result.session.sessionId.slice(0, 12)} • index ${result.session.feedState.index}`;
      return result.data || [];
    }

    async function preloadVideo(videoId) {
      if (preloadCache.has(videoId)) return preloadCache.get(videoId);
      const response = await fetch(`/api/videos/${videoId}/preload`);
      const result = await response.json();
      preloadCache.set(videoId, result.data);
      return result.data;
    }

    async function refreshSignedUrl(videoId) {
      const response = await fetch(`/api/videos/${videoId}/refresh_token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId })
      });
      return response.json();
    }

    async function sendPlaybackEvent(videoId, eventType, extra = {}) {
      await fetch(`/api/playback/${videoId}/events`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, eventType, position: video.currentTime || 0, watchTime: video.currentTime || 0, metadata: extra })
      });
    }

    async function registerView(videoId) {
      await fetch(`/api/video/${videoId}/view`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, watchTime: video.currentTime || 0 })
      });
    }

    async function likeCurrentVideo() {
      const current = feed[currentIndex];
      if (!current) return;
      await fetch(`/api/video/${current.id}/like`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId })
      });
      statusEl.textContent = `Like envoyé sur ${current.id}`;
    }

    function mountSource(url) {
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      } else if (window.Hls && Hls.isSupported()) {
        hlsInstance = new Hls({ maxBufferLength: 8, backBufferLength: 4 });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
      } else {
        throw new Error('HLS non supporté');
      }
    }

    async function playVideo(index) {
      if (index < 0 || index >= feed.length) return;
      currentIndex = index;
      const current = feed[currentIndex];
      statusEl.textContent = `Lecture ${currentIndex + 1}/${feed.length} • ${current.targetAspectRatio}`;
      captionEl.textContent = current.caption || 'Sans légende';
      metaEl.textContent = `Durée ${Number(current.duration || 0).toFixed(1)}s • ${current.width}x${current.height} • vues ${current.stats.views} • likes ${current.stats.likes}`;
      debugEl.textContent = `ABR: ${current.variants.map(v => `${v.name}:${v.resolution}`).join(' | ')}`;
      mountSource(current.signedPlayback || current.hlsUrl);
      await video.play().catch(() => {});
      await sendPlaybackEvent(current.id, 'play');
      await preloadNeighbours();
      if (currentIndex >= feed.length - 3) {
        const more = await fetchFeed(feed.length);
        feed = feed.concat(more);
      }
    }

    async function preloadNeighbours() {
      const targets = feed.slice(currentIndex + 1, currentIndex + 3);
      const details = await Promise.all(targets.map((item) => preloadVideo(item.id)));
      debugEl.textContent = `Préchargées: ${details.map(detail => detail?.id).filter(Boolean).join(', ') || 'aucune'}`;
    }

    async function bootstrap() {
      bufferingEl.style.display = 'grid';
      feed = await fetchFeed(0);
      bufferingEl.style.display = 'none';
      await playVideo(0);
    }

    prevBtn.onclick = () => playVideo(currentIndex - 1);
    nextBtn.onclick = async () => {
      const current = feed[currentIndex];
      if (current) await sendPlaybackEvent(current.id, 'skip');
      playVideo(currentIndex + 1);
    };
    likeBtn.onclick = likeCurrentVideo;
    toggleBtn.onclick = () => video.paused ? video.play() : video.pause();
    muteBtn.onclick = () => { video.muted = !video.muted; muteBtn.textContent = video.muted ? 'Son' : 'Mute'; };
    reloadBtn.onclick = bootstrap;

    video.addEventListener('timeupdate', async () => {
      const progress = video.duration ? (video.currentTime / video.duration) * 100 : 0;
      progressBar.style.width = `${Math.min(progress, 100)}%`;
      const current = feed[currentIndex];
      if (!current) return;
      const second = Math.floor(video.currentTime || 0);
      if (second !== lastSentSecond && second > 0) {
        lastSentSecond = second;
        await fetch(`/api/sessions/${sessionId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ feedState: { index: currentIndex, currentVideoId: current.id, progress: video.currentTime }, videoId: current.id })
        });
      }
      if (current.tokenExpiresAt && Date.now() / 1000 > current.tokenExpiresAt - 30) {
        const refreshed = await refreshSignedUrl(current.id);
        current.signedPlayback = `${current.hlsUrl}?token=${refreshed.data.token}`;
        current.tokenExpiresAt = refreshed.data.expiresAt;
      }
    });

    video.addEventListener('waiting', () => bufferingEl.style.display = 'grid');
    video.addEventListener('playing', () => bufferingEl.style.display = 'none');
    video.addEventListener('pause', () => sendPlaybackEvent(feed[currentIndex]?.id, 'pause').catch(() => {}));
    video.addEventListener('ended', async () => {
      const current = feed[currentIndex];
      if (current) {
        await sendPlaybackEvent(current.id, 'ended');
        await registerView(current.id);
      }
      playVideo(currentIndex + 1);
    });

    let touchStartY = 0;
    window.addEventListener('touchstart', (event) => { touchStartY = event.changedTouches[0].screenY; }, { passive: true });
    window.addEventListener('touchend', (event) => {
      const delta = touchStartY - event.changedTouches[0].screenY;
      if (delta > 70) nextBtn.click();
      if (delta < -70) prevBtn.click();
    }, { passive: true });
    window.addEventListener('keydown', (event) => {
      if (event.code === 'ArrowUp') prevBtn.click();
      if (event.code === 'ArrowDown') nextBtn.click();
      if (event.code === 'Space') { event.preventDefault(); toggleBtn.click(); }
    });

    bootstrap().catch((error) => {
      bufferingEl.style.display = 'none';
      statusEl.textContent = error.message;
      console.error(error);
    });
  </script>
</body>
</html>
