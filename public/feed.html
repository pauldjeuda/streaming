<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Short streaming vertical</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: #050505; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
    .app, .video-container { width: 100vw; height: 100vh; position: relative; }
    video { width: 100%; height: 100%; object-fit: cover; background: #000; }
    .topbar, .side, .bottom, .panel { position: absolute; z-index: 4; }
    .topbar { top: 12px; left: 12px; right: 12px; display: flex; gap: 12px; justify-content: space-between; }
    .chip, button { background: rgba(10,10,10,.58); border: 1px solid rgba(255,255,255,.14); color: #fff; border-radius: 14px; padding: 10px 12px; }
    button { cursor: pointer; }
    .panel { top: 62px; left: 12px; max-width: min(92vw, 420px); display: grid; gap: 8px; }
    .side { right: 12px; bottom: 140px; display: flex; flex-direction: column; gap: 8px; }
    .bottom { left: 0; right: 0; bottom: 0; padding: 18px; background: linear-gradient(to top, rgba(0,0,0,.84), transparent); }
    .caption { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .meta { opacity: .9; font-size: 13px; line-height: 1.45; }
    .progress-wrap { margin-top: 12px; height: 4px; background: rgba(255,255,255,.15); border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, #00d4ff, #7c5cff); }
    .buffering { position: absolute; inset: 0; display: none; place-items: center; background: rgba(0,0,0,.26); z-index: 5; }
    .buffering span { padding: 10px 14px; border-radius: 999px; background: rgba(0,0,0,.7); }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="chip" id="status">Chargement...</div>
    </div>

    <div class="video-container" id="videoContainer">
      <video id="video" playsinline muted autoplay></video>
      <div class="buffering" id="buffering"><span>Chargement ...</span></div>

      <div class="side">
        <button id="likeBtn">❤</button>
        <button id="toggleBtn">Pause</button>
        <button id="muteBtn">Son</button>
      </div>

      <div class="bottom">
        <div class="caption" id="caption"></div>
        <div class="meta" id="meta"></div>
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById("video");
    const statusEl = document.getElementById("status");
    const captionEl = document.getElementById("caption");
    const metaEl = document.getElementById("meta");
    const progressBar = document.getElementById("progressBar");
    const bufferingEl = document.getElementById("buffering");

    const likeBtn = document.getElementById("likeBtn");
    const toggleBtn = document.getElementById("toggleBtn");
    const muteBtn = document.getElementById("muteBtn");

    let hlsInstance = null;
    let feed = [];
    let currentIndex = 0;
    let sessionId = localStorage.getItem("demo_session_id") || `sess_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    let userLikes = new Set(); // Garder en mémoire les vidéos likées par l'utilisateur
    let preloadCache = new Map(); // Cache des vidéos préchargées
    let preloadedInstances = new Map(); // Instances HLS préchargées
    let preloadedBuffers = new Map(); // Buffers pré-remplis
    let isTransitioning = false; // Éviter les conflits pendant transitions

    localStorage.setItem("demo_session_id", sessionId);

    async function fetchFeed(offset = 0) {
      const response = await fetch(`/api/v2/feed?session_id=${sessionId}&limit=20&offset=${offset}`);
      const result = await response.json();
      if (!result.success) throw new Error(result.message || "Erreur feed");
      return result.data || [];
    }

    // Précharger les 10 prochaines vidéos en arrière-plan pour une fluidité absolue
    async function preloadNextVideos() {
      if (isTransitioning) return; // Ne pas précharger pendant transition
      
      const nextIndices = [currentIndex + 1, currentIndex + 2, currentIndex + 3, currentIndex + 4, currentIndex + 5, currentIndex + 6, currentIndex + 7, currentIndex + 8, currentIndex + 9, currentIndex + 10];
      
      for (const index of nextIndices) {
        if (index >= feed.length) continue;
        
        const video = feed[index];
        if (!video || video.status !== 'ready' || preloadCache.has(video.id)) continue;
        
        try {
          // Créer une instance HLS cachée pour le pré-préchargement
          const hiddenVideo = document.createElement('video');
          hiddenVideo.muted = true;
          hiddenVideo.preload = 'auto';
          hiddenVideo.style.display = 'none';
          hiddenVideo.style.position = 'absolute';
          hiddenVideo.style.top = '-9999px';
          hiddenVideo.style.left = '-9999px';
          hiddenVideo.setAttribute('playsinline', '');
          document.body.appendChild(hiddenVideo);
          
          let hlsPreload = null;
          const videoUrl = video.signedPlayback || video.hlsUrl;
          
          if (window.Hls && Hls.isSupported()) {
            hlsPreload = new Hls({ 
              maxBufferLength: 120,        // Buffer extrêmement grand
              backBufferLength: 30,        // Garder beaucoup en mémoire
              maxMaxBufferLength: 240,     // Buffer maximum immense
              enableWorker: true,
              lowLatencyMode: true,
              maxBufferSize: 120 * 1000 * 1000,  // 120MB buffer
              maxBufferHole: 0.3,
              startLevel: -1,              // Commencer à la plus basse qualité
              capLevelToPlayerSize: true,
              maxFragLookUpTolerance: 0.25, // Plus tolérant aux fragments
              liveSyncDurationCount: 3,    // Sync plus rapide
              liveMaxLatencyDurationCount: Infinity,
              preferManagedMediaSource: true // Optimiser pour MediaSource
            });
            
            hlsPreload.loadSource(videoUrl);
            hlsPreload.attachMedia(hiddenVideo);
            
            // PRÉ-PRÉCHARGEMENT AGRESSIF
            const aggressivePreload = async () => {
              try {
                await hiddenVideo.play();
                hiddenVideo.pause();
                
                // Charger plusieurs segments en parallèle
                for (let i = 0; i < 5; i++) {
                  hiddenVideo.currentTime = i * 2;
                  await new Promise(resolve => setTimeout(resolve, 200));
                }
                
                hiddenVideo.currentTime = 0;
                
                // Marquer comme complètement préchargé
                preloadedBuffers.set(video.id, {
                  fullyLoaded: true,
                  segmentsLoaded: 10,
                  loadTime: Date.now()
                });
                
                console.log(`🚀 Vidéo ${video.id} AGRESSIVEMENT préchargée (10 segments)`);
              } catch (error) {
                console.log(`⚠️ Préchargement partiel ${video.id}:`, error.message);
              }
            };
            
            // Démarrer le pré-préchargement
            aggressivePreload();
            
            // Écouter les événements de chargement pour monitoring
            let segmentCount = 0;
            hlsPreload.on(Hls.Events.FRAG_BUFFERED, () => {
              segmentCount++;
              if (segmentCount % 3 === 0) {
                console.log(`� ${segmentCount} segments chargés pour ${video.id}`);
              }
            });
            
            preloadedInstances.set(video.id, { 
              hls: hlsPreload, 
              video: hiddenVideo, 
              fullyLoaded: false,
              preloadStartTime: Date.now()
            });
          } else {
            hiddenVideo.src = videoUrl;
            hiddenVideo.load();
            preloadedInstances.set(video.id, { video: hiddenVideo });
          }
          
          preloadCache.set(video.id, true);
          
        } catch (error) {
          console.error(`❌ Erreur préchargement ${video.id}:`, error);
        }
      }
    }

    // Nettoyer les instances préchargées anciennes - VERSION OPTIMISÉE
    function cleanupOldPreloads() {
      const keepIds = new Set();
      for (let i = Math.max(0, currentIndex - 3); i <= currentIndex + 10; i++) {
        if (feed[i]) keepIds.add(feed[i].id);
      }
      
      for (const [videoId, instance] of preloadedInstances) {
        if (!keepIds.has(videoId)) {
          if (instance.hls) {
            instance.hls.stopLoad(); // Arrêter le chargement en premier
            setTimeout(() => {
              instance.hls.destroy();
            }, 100);
          }
          if (instance.video) instance.video.remove();
          preloadedInstances.delete(videoId);
          preloadCache.delete(videoId);
          preloadedBuffers.delete(videoId);
        }
      }
    }

    async function playVideo(index) {
      if (index < 0 || index >= feed.length) return;
      
      // Éviter les transitions multiples
      if (isTransitioning) return;
      isTransitioning = true;
      
      currentIndex = index;
      const current = feed[currentIndex];
      
      // Gérer les vidéos en processing
      if (current.status === 'processing') {
        statusEl.textContent = `EN TRAITEMENT ${currentIndex + 1}/${feed.length}`;
        captionEl.textContent = current.caption || 'Vidéo en cours de traitement...';
        metaEl.textContent = `Transcodage en cours... • Créée: ${new Date(current.createdAt).toLocaleTimeString()}`;
        
        // Afficher un placeholder ou thumbnail si disponible
        if (current.thumbnailUrl) {
          video.poster = current.thumbnailUrl;
          video.src = '';
        } else {
          video.poster = '';
          video.src = '';
        }
        
        bufferingEl.innerHTML = '<span>Vidéo en cours de traitement...</span>';
        bufferingEl.style.display = 'grid';
        isTransitioning = false;
        return;
      }
      
      statusEl.textContent = `Lecture ${currentIndex + 1}/${feed.length}`;
      captionEl.textContent = current.caption || 'Sans légende';
      metaEl.textContent = `Durée ${Number(current.duration || 0).toFixed(1)}s • ${current.width}x${current.height} • vues ${current.stats.views} • likes ${current.stats.likes}`;
      
      // Mettre à jour le bouton like en fonction de l'état
      if (userLikes.has(current.id)) {
        likeBtn.textContent = '❤️'; // Like actif
        likeBtn.style.color = '#ff0066';
      } else {
        likeBtn.textContent = '🤍'; // Like inactif
        likeBtn.style.color = '#fff';
      }
      
      // NE JAMAIS afficher le buffering pour les transitions
      bufferingEl.style.display = 'none';
      
      // Vérifier si la vidéo est déjà préchargée avec buffer
      const preloaded = preloadedInstances.get(current.id);
      const bufferInfo = preloadedBuffers.get(current.id);
      const videoUrl = current.signedPlayback || current.hlsUrl;
      
      if (preloaded && (bufferInfo?.fullyLoaded || Date.now() - preloaded.preloadStartTime < 3000)) {
        // UTILISER L'INSTANCE PRÉCHARGÉE - TRANSITION ZERO LATENCE
        console.log(`⚡ TRANSITION ZERO LATENCE pour ${current.id}`);
        
        if (preloaded.hls) {
          // Détruire l'instance actuelle silencieusement et instantanément
          if (hlsInstance) {
            try {
              hlsInstance.detachMedia();
              hlsInstance.stopLoad();
            } catch (e) {}
            setTimeout(() => {
              try {
                hlsInstance.destroy();
              } catch (e) {}
            }, 50);
          }
          
          // Réutiliser l'instance préchargée INSTANTANÉMENT
          hlsInstance = preloaded.hls;
          hlsInstance.attachMedia(video);
          
          // Démarrer la lecture immédiatement sans attendre
          const playPromise = video.play();
          
          if (playPromise !== undefined) {
            playPromise.catch(() => {});
          }
          
          // Nettoyer de la liste des préchargés
          preloadedInstances.delete(current.id);
          preloadCache.delete(current.id);
          preloadedBuffers.delete(current.id);
          
        } else {
          // Utiliser la vidéo préchargée
          video.src = videoUrl;
          video.play().catch(() => {});
        }
        
      } else {
        // CHARGEMENT NORMAL AVEC BUFFER OPTIMISÉ ULTRA-RAPIDE
        console.log(`🔄 Chargement normal pour ${current.id}`);
        
        if (hlsInstance) { 
          try {
            hlsInstance.detachMedia();
            hlsInstance.stopLoad();
          } catch (e) {}
          setTimeout(() => {
            try {
              hlsInstance.destroy();
            } catch (e) {}
          }, 50);
          hlsInstance = null;
        }
        
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = videoUrl;
          video.load(); // Forcer le chargement immédiat
        } else if (window.Hls && Hls.isSupported()) {
          hlsInstance = new Hls({ 
            maxBufferLength: 30,        // Buffer moyen pour démarrage rapide
            backBufferLength: 10,
            maxMaxBufferLength: 60,
            enableWorker: true,
            lowLatencyMode: true,
            startLevel: -1,            // Commencer au niveau le plus bas
            capLevelToPlayerSize: true,
            abrEwmaFastLive: 1.0,       // ABR ultra-réactif
            abrEwmaSlowLive: 3.0,
            abrEwmaVod: 1.0,
            abrEwmaDefault: 2.0,
            maxFragLookUpTolerance: 0.2,
            preferManagedMediaSource: true
          });
          hlsInstance.loadSource(videoUrl);
          hlsInstance.attachMedia(video);
        }
        
        // Forcer la lecture immédiate
        video.play().catch(() => {});
      }
      
      // Nettoyer les anciens préchargements et précharger les prochains
      cleanupOldPreloads();
      
      // Précharger les prochaines vidéos avec un très petit délai
      setTimeout(() => {
        isTransitioning = false;
        preloadNextVideos();
      }, 50);
    }

    // Actualiser les likes automatiquement toutes les 5 secondes
    async function updateLikes() {
      if (feed.length === 0) return;
      
      try {
        const refreshedFeed = await fetchFeed(0);
        
        // Mettre à jour les likes dans le feed actuel
        refreshedFeed.forEach(newVideo => {
          const existingIndex = feed.findIndex(v => v.id === newVideo.id);
          if (existingIndex !== -1) {
            feed[existingIndex].stats.likes = newVideo.stats.likes;
            feed[existingIndex].stats.views = newVideo.stats.views;
            
            // Si c'est la vidéo actuelle, mettre à jour l'affichage
            if (existingIndex === currentIndex) {
              const current = feed[currentIndex];
              metaEl.textContent = `Durée ${Number(current.duration || 0).toFixed(1)}s • ${current.width}x${current.height} • vues ${current.stats.views} • likes ${current.stats.likes}`;
            }
          }
        });
      } catch (error) {
        console.error('Erreur mise à jour likes:', error);
      }
    }

    async function bootstrap() {
      bufferingEl.style.display = 'grid';
      feed = await fetchFeed(0);
      bufferingEl.style.display = 'none';
      await playVideo(0);
      
      // Précharger les 10 premières vidéos après le démarrage pour une fluidité absolue
      setTimeout(() => {
        preloadNextVideos();
      }, 200);
      
      // Démarrer un préchargement continu en arrière-plan
      setInterval(() => {
        if (!isTransitioning) {
          preloadNextVideos();
        }
      }, 3000);
    }

    likeBtn.onclick = async () => {
      const current = feed[currentIndex];
      if (!current) return;
      
      try {
        const response = await fetch(`/api/video/${current.id}/like`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
        
        const result = await response.json();
        
        if (result.success) {
          // Mettre à jour le nombre de likes depuis la réponse du serveur
          current.stats.likes = result.data.likes;
          
          // Mettre à jour l'état du like utilisateur
          if (result.data.liked) {
            userLikes.add(current.id);
            statusEl.textContent = `Like envoyé sur ${current.id}`;
          } else {
            userLikes.delete(current.id);
            statusEl.textContent = `Like retiré sur ${current.id}`;
          }
          
          // Mettre à jour l'affichage
          metaEl.textContent = `Durée ${Number(current.duration || 0).toFixed(1)}s • ${current.width}x${current.height} • vues ${current.stats.views} • likes ${current.stats.likes}`;
          
          // Mettre à jour le bouton
          if (result.data.liked) {
            likeBtn.textContent = '❤️'; // Like actif
            likeBtn.style.color = '#ff0066';
          } else {
            likeBtn.textContent = '🤍'; // Like inactif
            likeBtn.style.color = '#fff';
          }
        } else {
          statusEl.textContent = `Erreur: ${result.message}`;
        }
        
      } catch (error) {
        console.error('Erreur like/unlike:', error);
        statusEl.textContent = `Erreur: ${error.message}`;
      }
    };
    
    toggleBtn.onclick = () => video.paused ? video.play() : video.pause();
    muteBtn.onclick = () => { video.muted = !video.muted; muteBtn.textContent = video.muted ? 'Son' : 'Mute'; };

    video.addEventListener('timeupdate', () => {
      const progress = video.duration ? (video.currentTime / video.duration) * 100 : 0;
      progressBar.style.width = `${Math.min(progress, 100)}%`;
    });

    // Optimisation ULTIME du buffering - ZERO BUFFERING VISIBLE
    let bufferingTimeout;
    video.addEventListener('waiting', () => {
      clearTimeout(bufferingTimeout);
      // N'afficher le buffering que si c'est un vrai problème réseau (> 5 secondes)
      bufferingTimeout = setTimeout(() => {
        if (video.readyState < 3 && video.currentTime > 1) { // HAVE_FUTURE_DATA et lecture avancée
          bufferingEl.style.display = 'grid';
          console.log('⚠️ Vrai buffering critique détecté (problème réseau sévère)');
        }
      }, 5000); // Attendre 5 secondes avant de montrer le buffering
    });
    
    video.addEventListener('playing', () => {
      clearTimeout(bufferingTimeout);
      bufferingEl.style.display = 'none';
    });
    
    video.addEventListener('canplay', () => {
      clearTimeout(bufferingTimeout);
      bufferingEl.style.display = 'none';
    });
    
    video.addEventListener('canplaythrough', () => {
      clearTimeout(bufferingTimeout);
      bufferingEl.style.display = 'none';
    });
    
    video.addEventListener('loadeddata', () => {
      clearTimeout(bufferingTimeout);
      bufferingEl.style.display = 'none';
    });
    
    video.addEventListener('loadstart', () => {
      // Ne jamais afficher au début du chargement
      bufferingEl.style.display = 'none';
    });
    
    video.addEventListener('seeking', () => {
      // Ne pas afficher pendant les seeks
      bufferingEl.style.display = 'none';
    });
    
    video.addEventListener('seeked', () => {
      clearTimeout(bufferingTimeout);
      bufferingEl.style.display = 'none';
    });
    video.addEventListener('pause', () => {
      const current = feed[currentIndex];
      if (current) {
        fetch(`/api/playback/${current.id}/events`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, eventType: 'pause', position: video.currentTime || 0 })
        }).catch(() => {});
      }
    });
    
    video.addEventListener('ended', async () => {
      const current = feed[currentIndex];
      if (current) {
        await fetch(`/api/video/${current.id}/view`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, watchTime: video.currentTime || 0 })
        });
      }
      playVideo(currentIndex + 1);
    });

    video.addEventListener('touchstart', (e) => e.preventDefault());
    video.addEventListener('touchend', (e) => e.preventDefault());

    // Navigation au clavier
    window.addEventListener('keydown', (event) => {
      if (event.code === 'ArrowUp') playVideo(currentIndex - 1);
      if (event.code === 'ArrowDown') playVideo(currentIndex + 1);
      if (event.code === 'Space') { 
        event.preventDefault(); 
        toggleBtn.click(); 
      }
    });

    // Navigation tactile (swipe)
    let touchStartY = 0;
    window.addEventListener('touchstart', (event) => { 
      touchStartY = event.changedTouches[0].screenY; 
    }, { passive: true });
    
    window.addEventListener('touchend', (event) => {
      const delta = touchStartY - event.changedTouches[0].screenY;
      if (delta > 70) playVideo(currentIndex - 1); // Swipe up = previous
      if (delta < -70) playVideo(currentIndex + 1); // Swipe down = next
    }, { passive: true });

    // Démarrer l'actualisation automatique des likes toutes les 5 secondes
    setInterval(updateLikes, 5000);

    bootstrap().catch((error) => {
      bufferingEl.style.display = 'none';
      statusEl.textContent = error.message;
      console.error(error);
    });
  </script>
</body>
</html>
