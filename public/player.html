<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecteur HLS Test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .video-wrapper {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 20px;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    video {
      width: 100%;
      height: 740px;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .panel {
      max-width: 420px;
      margin: 0 auto;
      background: #1b1b1b;
      border-radius: 16px;
      padding: 16px;
    }

    .row {
      margin-bottom: 12px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
      box-sizing: border-box;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
    }

    .primary {
      background: #0a84ff;
      color: white;
    }

    .secondary {
      background: #333;
      color: white;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0d0d0d;
      padding: 12px;
      border-radius: 12px;
      overflow: auto;
      max-height: 240px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Test lecteur HLS</h1>

    <div class="panel">
      <div class="row">
        <label for="videoId">ID vidéo</label>
        <input
          id="videoId"
          type="text"
          value="69ba9bdb040291108c0be538"
          placeholder="Entre l'ID de la vidéo"
        />
      </div>

      <div class="row">
        <button class="primary" id="loadBtn">Charger la vidéo</button>
        <button class="secondary" id="playBtn">Play</button>
        <button class="secondary" id="pauseBtn">Pause</button>
      </div>
    </div>

    <div class="video-wrapper">
      <video id="video" controls playsinline></video>
    </div>

    <div class="panel">
      <h3>Métadonnées vidéo</h3>
      <pre id="meta"></pre>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById("video");
    const meta = document.getElementById("meta");
    const videoIdInput = document.getElementById("videoId");
    const loadBtn = document.getElementById("loadBtn");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");

    let hlsInstance = null;

    async function loadVideo() {
      const videoId = videoIdInput.value.trim();

      if (!videoId) {
        alert("Entre un ID vidéo");
        return;
      }

      const response = await fetch(`/api/videos/${videoId}`);
      const result = await response.json();

      meta.textContent = JSON.stringify(result, null, 2);

      if (!result.success) {
        alert(result.message || "Impossible de charger la vidéo");
        return;
      }

      const hlsUrl = result.data.hlsUrl;
      const thumbnailUrl = result.data.thumbnailUrl;

      if (thumbnailUrl) {
        video.poster = thumbnailUrl;
      }

      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }

      if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = hlsUrl;
      } else if (window.Hls && Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(hlsUrl);
        hlsInstance.attachMedia(video);
      } else {
        alert("HLS non supporté sur ce navigateur");
      }
    }

    loadBtn.addEventListener("click", loadVideo);
    playBtn.addEventListener("click", () => video.play());
    pauseBtn.addEventListener("click", () => video.pause());

    video.addEventListener("play", () => {
      console.log("event: play");
    });

    video.addEventListener("pause", () => {
      console.log("event: pause");
    });

    video.addEventListener("ended", () => {
      console.log("event: ended");
    });
  </script>
</body>
</html>
